<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Form Validation</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <link href="style.css" rel="stylesheet" />
  </head>
  <body>
    <div class="container">
      <div class="row justify-content-center">
        <div class="col-md-6">
          <div class="card p-4">
            <h2 class="text-center mb-4">Register Form</h2>

            <h1>Hi This is me!</h1>

            <form id="registrationForm">
              <div class="mb-3">
                <label for="fullName" class="form-label">Full Name</label>
                <input
                  type="text"
                  class="form-control"
                  id="fullName"
                  placeholder="Enter full name"
                />
                <div class="error-msg" id="nameError">
                  Name must be at least 5 characters.
                </div>
              </div>
              <div class="mb-3">
                <label for="email" class="form-label">Email ID</label>
                <input
                  type="email"
                  class="form-control"
                  id="email"
                  placeholder="Enter email"
                />
                <div class="error-msg" id="emailError">
                  Enter a valid email with "@" in it.
                </div>
              </div>
              <div class="mb-3">
                <label for="phone" class="form-label">Phone Number</label>
                <input
                  type="text"
                  class="form-control"
                  id="phone"
                  placeholder="10-digit phone number"
                />
                <div class="error-msg" id="phoneError">
                  Enter a valid 10-digit phone (not 1234567890).
                </div>
              </div>
              <div class="mb-3">
                <label for="password" class="form-label">Password</label>
                <input
                  type="password"
                  class="form-control"
                  id="password"
                  placeholder="Create password"
                />
                <div class="error-msg" id="passwordError">
                  Password must be 8+ chars, not 'password' or your name.
                </div>
              </div>
              <div class="mb-3">
                <label for="confirmPassword" class="form-label"
                  >Confirm Password</label
                >
                <input
                  type="password"
                  class="form-control"
                  id="confirmPassword"
                  placeholder="Re-enter password"
                />
                <div class="error-msg" id="confirmPasswordError">
                  Passwords do not match.
                </div>
              </div>
              <button type="submit" class="btn btn-primary w-100">
                Register
              </button>
            </form>
          </div>
        </div>
      </div>
    </div>

    <script>
      const form = document.getElementById("registrationForm");

      const fullName = document.getElementById("fullName");
      const email = document.getElementById("email");
      const phone = document.getElementById("phone");
      const password = document.getElementById("password");
      const confirmPassword = document.getElementById("confirmPassword");

      const nameError = document.getElementById("nameError");
      const emailError = document.getElementById("emailError");
      const phoneError = document.getElementById("phoneError");
      const passwordError = document.getElementById("passwordError");
      const confirmPasswordError = document.getElementById(
        "confirmPasswordError",
      );

      function showError(input, errorElement, message) {
        errorElement.textContent = message;
        errorElement.style.display = "block";
        input.classList.add("error-input");
        input.classList.remove("success-input");
      }

      function showSuccess(input, errorElement) {
        errorElement.style.display = "none";
        input.classList.remove("error-input");
        input.classList.add("success-input");
      }

      function validateName() {
        const val = fullName.value.trim();
        if (val.length < 5) {
          showError(fullName, nameError, "Name must be at least 5 characters.");
          return false;
        }
        showSuccess(fullName, nameError);
        return true;
      }

      function validateEmail() {
        const val = email.value.trim();
        if (val.length < 5 || !val.includes("@")) {
          showError(email, emailError, "Enter a valid email with '@'.");
          return false;
        }
        showSuccess(email, emailError);
        return true;
      }

      function validatePhone() {
        const val = phone.value.trim();
        if (val.length !== 10 || !/^\d+$/.test(val) || val === "1234567890") {
          showError(
            phone,
            phoneError,
            "Enter a valid 10-digit phone (not 1234567890).",
          );
          return false;
        }
        showSuccess(phone, phoneError);
        return true;
      }

      function validatePassword() {
        const pwd = password.value.trim();
        const lowerPwd = pwd.toLowerCase();
        const nameLower = fullName.value.trim().toLowerCase();
        if (
          pwd.length < 8 ||
          lowerPwd === "password" ||
          lowerPwd === nameLower
        ) {
          showError(password, passwordError, "Password too weak or invalid.");
          return false;
        }
        showSuccess(password, passwordError);
        return true;
      }

      function validateConfirmPassword() {
        if (
          confirmPassword.value !== password.value ||
          confirmPassword.value === ""
        ) {
          showError(
            confirmPassword,
            confirmPasswordError,
            "Passwords do not match.",
          );
          return false;
        }
        showSuccess(confirmPassword, confirmPasswordError);
        return true;
      }

      // Real-time validation
      [fullName, email, phone, password, confirmPassword].forEach((input) => {
        input.addEventListener("input", () => {
          switch (input.id) {
            case "fullName":
              validateName();
              break;
            case "email":
              validateEmail();
              break;
            case "phone":
              validatePhone();
              break;
            case "password":
              validatePassword();
              validateConfirmPassword();
              break;
            case "confirmPassword":
              validateConfirmPassword();
              break;
          }
        });
      });

      form.addEventListener("submit", function (e) {
        e.preventDefault();

        const isValid =
          validateName() &&
          validateEmail() &&
          validatePhone() &&
          validatePassword() &&
          validateConfirmPassword();

        if (isValid) {
          // Show success
          alert("🎉 Registration Successful!");
          form.reset();
          document.querySelectorAll("input").forEach((input) => {
            input.classList.remove("success-input", "error-input");
          });
        } else {
          // Keep focus visible for errors
          alert("⚠ Please fix the errors before submitting.");
        }
      });
    </script>
  </body>
</html>
